<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <title>FaegAz Notes</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    input,
    textarea,
    button,
    select {
      -webkit-app-region: no-drag;
    }

    input,
    textarea {
      user-select: text;
      -webkit-user-select: text;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    .app {
      width: 100%;
      height: 100%;
      background: #080810;
      font-family: 'Inter', system-ui, sans-serif;
      position: relative;
      flex-direction: column;
    }

    .app-body {
      display: flex;
      flex: 1;
      height: 100%;
      overflow: hidden;
      position: relative;
    }

    /* ── WebGL Shader Canvas ── */
    #shader-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.15;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 64px;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.02);
      border-right: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 10;
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      white-space: nowrap;
    }

    .sidebar:hover {
      width: 200px;
    }

    .sidebar-header {
      padding: 18px 16px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .app-name {
      font-size: 18px;
      font-weight: 600;
      background: linear-gradient(90deg, #c084fc, #a855f7, #eab308);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .app-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a855f7, #eab308);
      box-shadow: 0 0 8px rgba(168, 85, 247, 0.7);
      flex-shrink: 0;
      -webkit-text-fill-color: initial;
    }

    .search-box {
      margin-top: 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 8px;
      padding: 7px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .search-icon {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.2);
      flex-shrink: 0;
    }

    .search-input {
      background: none;
      border: none;
      outline: none;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
      font-family: inherit;
      width: 100%;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .sidebar:hover .search-input {
      opacity: 1;
    }

    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.18);
    }

    .nav {
      padding: 10px 4px;
      flex: 1;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: 8px;
      margin-bottom: 2px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.15s;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    .nav-item.active {
      background: rgba(168, 85, 247, 0.12);
      border: 1px solid rgba(168, 85, 247, 0.15);
    }

    .nav-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .nav-icon.purple {
      background: rgba(168, 85, 247, 0.15);
      color: #a855f7;
    }

    .nav-icon.pink {
      background: rgba(236, 72, 153, 0.15);
      color: #ec4899;
    }

    .nav-icon.yellow {
      background: rgba(234, 179, 8, 0.12);
      color: #eab308;
    }

    .nav-icon.teal {
      background: rgba(20, 184, 166, 0.12);
      color: #14b8a6;
    }

    .nav-icon.blue {
      background: rgba(59, 130, 246, 0.12);
      color: #3b82f6;
    }

    .nav-label {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      margin-left: 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .sidebar:hover .nav-label {
      opacity: 1;
    }

    .nav-item.active .nav-label {
      color: rgba(255, 255, 255, 0.9);
      font-weight: 600;
    }

    .sidebar-footer {
      padding: 12px 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
    }

    .fp-btn {
      width: 100%;
      background: rgba(168, 85, 247, 0.1);
      border: 1px solid rgba(168, 85, 247, 0.2);
      border-radius: 8px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .fp-btn:hover {
      background: rgba(168, 85, 247, 0.18);
    }

    .fp-btn-text {
      font-size: 11px;
      color: rgba(168, 85, 247, 0.8);
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .sidebar:hover .fp-btn-text {
      opacity: 1;
    }

    .fp-btn-badge {
      margin-left: auto;
      font-size: 9px;
      color: rgba(168, 85, 247, 0.45);
      background: rgba(168, 85, 247, 0.08);
      padding: 2px 6px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .sidebar:hover .fp-btn-badge {
      opacity: 1;
    }

    /* ── Ana İçerik ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
      overflow: hidden;
    }

    /* ── Global Titlebar ── */
    .global-titlebar {
      height: 48px;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.015);
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      -webkit-app-region: drag;
      z-index: 20;
    }

    .topbar-actions {
      display: flex;
      gap: 8px;
    }

    .btn-ghost {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 7px;
      padding: 6px 12px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }

    .btn-ghost:hover {
      background: rgba(255, 255, 255, 0.07);
    }

    .btn-accent {
      background: rgba(168, 85, 247, 0.15);
      border: 1px solid rgba(168, 85, 247, 0.25);
      border-radius: 7px;
      padding: 6px 12px;
      font-size: 11px;
      color: #a855f7;
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      transition: background 0.15s;
    }

    .btn-accent:hover {
      background: rgba(168, 85, 247, 0.25);
    }

    .win-btn {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      font-size: 11px;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
    }

    .win-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.9);
    }

    .win-btn.close:hover {
      background: rgba(255, 80, 80, 0.25);
      color: #fff;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .section-label {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.2);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 500;
      padding: 4px 0 6px;
    }

    /* Not kartları */
    .note-card {
      background: rgba(168, 85, 247, 0.06);
      border: 1px solid rgba(168, 85, 247, 0.12);
      border-radius: 10px;
      padding: 12px 14px;
      cursor: pointer;
      transition: background 0.15s;
      border-left: 2px solid rgba(168, 85, 247, 0.45);
    }

    .note-card:hover {
      background: rgba(168, 85, 247, 0.1);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #c084fc;
    }

    .card-date {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.18);
    }

    .card-preview {
      font-size: 11.5px;
      color: rgba(255, 255, 255, 0.38);
      line-height: 1.5;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .card-delete {
      opacity: 0.15;
      font-size: 10px;
      color: rgba(255, 80, 80, 0.6);
      cursor: pointer;
      background: none;
      border: none;
      margin-left: 8px;
      transition: all 0.15s;
    }

    .note-card:hover .card-delete,
    .word-card:hover .card-delete,
    .habit-card:hover .card-delete {
      opacity: 0.6;
    }

    .card-delete:hover {
      opacity: 1 !important;
      color: #ff5050;
      transform: scale(1.1);
    }

    /* Inline yeni not */
    .inline-new-card {
      background: rgba(168, 85, 247, 0.07);
      border: 1px solid rgba(168, 85, 247, 0.3);
      border-radius: 10px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .inline-new-card.yellow {
      background: rgba(234, 179, 8, 0.07);
      border-color: rgba(234, 179, 8, 0.3);
    }

    .inline-new-card.pink {
      background: rgba(236, 72, 153, 0.07);
      border-color: rgba(236, 72, 153, 0.3);
    }

    .inline-new-card.teal {
      background: rgba(20, 184, 166, 0.07);
      border-color: rgba(20, 184, 166, 0.3);
    }

    .inline-new-title {
      background: none;
      border: none;
      border-bottom: 1px solid rgba(168, 85, 247, 0.2);
      outline: none;
      font-size: 14px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.9);
      font-family: inherit;
      padding: 4px 0;
      width: 100%;
    }

    .inline-new-title::placeholder {
      color: rgba(255, 255, 255, 0.2);
      font-weight: 400;
    }

    .inline-new-card.teal .inline-new-title {
      border-bottom-color: rgba(20, 184, 166, 0.2);
    }

    .inline-new-card.teal .inline-new-title:focus {
      border-bottom-color: rgba(20, 184, 166, 0.5);
    }

    .inline-new-card.blue {
      background: rgba(59, 130, 246, 0.07);
      border-color: rgba(59, 130, 246, 0.3);
    }

    .inline-new-card.blue .inline-compact-input:focus {
      border-bottom-color: rgba(59, 130, 246, 0.5);
    }

    .inline-new-body {
      background: none;
      border: none;
      outline: none;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.75);
      font-family: inherit;
      resize: none;
      width: 100%;
      min-height: 80px;
      line-height: 1.6;
    }

    .inline-new-body::placeholder {
      color: rgba(255, 255, 255, 0.18);
    }

    .inline-new-actions {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
    }

    .section-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0 6px;
    }

    .section-add-btn {
      font-size: 24px;
      font-weight: 300;
      color: rgba(168, 85, 247, 0.6);
      background: none;
      border: none;
      cursor: pointer;
      line-height: 1;
      padding: 0 4px;
      transition: color 0.15s, transform 0.1s;
    }

    .section-add-btn:hover {
      color: #a855f7;
      transform: scale(1.1);
    }

    /* Kelime kartları */
    .word-card {
      background: rgba(234, 179, 8, 0.05);
      border: 1px solid rgba(234, 179, 8, 0.12);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-left: 2px solid rgba(234, 179, 8, 0.4);
      cursor: pointer;
      transition: background 0.15s;
    }

    .word-card:hover {
      background: rgba(234, 179, 8, 0.08);
    }

    .word-en {
      font-size: 12px;
      color: rgba(234, 179, 8, 0.7);
      font-style: italic;
      min-width: 90px;
    }

    .word-arrow {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.12);
    }

    .word-tr {
      font-size: 12.5px;
      color: rgba(255, 255, 255, 0.8);
      font-weight: 600;
      flex: 1;
    }

    .word-tag {
      font-size: 9.5px;
      color: rgba(234, 179, 8, 0.45);
      background: rgba(234, 179, 8, 0.07);
      padding: 2px 7px;
      border-radius: 4px;
    }

    /* Todo */
    .todo-card {
      background: rgba(236, 72, 153, 0.05);
      border: 1px solid rgba(236, 72, 153, 0.1);
      border-radius: 10px;
      overflow: hidden;
      border-left: 2px solid rgba(236, 72, 153, 0.35);
    }

    .todo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(236, 72, 153, 0.06);
      cursor: pointer;
      transition: background 0.15s;
    }

    .todo-row:last-child {
      border-bottom: none;
    }

    .todo-row:hover {
      background: rgba(236, 72, 153, 0.05);
    }

    .tcheck {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.15);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .tcheck.done {
      background: rgba(168, 85, 247, 0.2);
      border: none;
      color: #a855f7;
      font-size: 9px;
    }

    .ttext {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      font-weight: 500;
      flex: 1;
    }

    .ttext.done {
      text-decoration: line-through;
      color: rgba(255, 255, 255, 0.2);
    }

    .todo-delete {
      opacity: 0.15;
      font-size: 10px;
      color: rgba(255, 80, 80, 0.6);
      cursor: pointer;
      background: none;
      border: none;
      transition: all 0.15s;
    }

    .todo-row:hover .todo-delete {
      opacity: 0.6;
    }

    .todo-delete:hover {
      opacity: 1 !important;
      color: #ff5050;
      transform: scale(1.1);
    }

    /* Modal — Yeni Not */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: rgba(12, 10, 20, 0.95);
      border: 1px solid rgba(168, 85, 247, 0.2);
      border-radius: 12px;
      padding: 20px;
      width: 360px;
      backdrop-filter: blur(28px);
    }

    .modal-title {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 12px;
    }

    .modal-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.8);
      font-family: inherit;
      resize: vertical;
      outline: none;
      min-height: 80px;
    }

    .modal-input::placeholder {
      color: rgba(255, 255, 255, 0.18);
    }

    .modal-input:focus {
      border-color: rgba(168, 85, 247, 0.35);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 12px;
    }

    /* Empty */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: rgba(255, 255, 255, 0.15);
      font-size: 12px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 2px;
    }

    /* ── Alışkanlık Takip ── */
    .habit-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(20, 184, 166, 0.1);
      border-radius: 10px;
      padding: 12px 14px;
      border-left: 2px solid rgba(20, 184, 166, 0.35);
    }

    .habit-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .habit-title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.85);
      flex: 1;
    }

    .habit-progress {
      font-size: 10px;
      color: rgba(20, 184, 166, 0.75);
      background: rgba(20, 184, 166, 0.08);
      border: 1px solid rgba(20, 184, 166, 0.15);
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .habit-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 4px;
    }

    .habit-day {
      aspect-ratio: 1;
      border-radius: 5px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: rgba(255, 255, 255, 0.2);
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s, color 0.12s;
      user-select: none;
    }

    .habit-day:hover {
      border-color: rgba(20, 184, 166, 0.45);
      color: rgba(20, 184, 166, 0.8);
    }

    .habit-day.checked {
      background: rgba(20, 184, 166, 0.18);
      border-color: rgba(20, 184, 166, 0.5);
      color: #14b8a6;
      font-weight: 600;
    }

    /* ── Takvim Ana Görünüm ── */
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-top: 10px;
    }

    .calendar-header-day {
      text-align: center;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      margin-bottom: 4px;
      font-weight: 600;
    }

    .calendar-day {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      min-height: 80px;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .calendar-day.empty {
      background: transparent;
      border-color: transparent;
      cursor: default;
    }

    .calendar-day:not(.empty):hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(59, 130, 246, 0.3);
    }

    .calendar-day.today {
      background: rgba(59, 130, 246, 0.08);
      border-color: rgba(59, 130, 246, 0.4);
    }

    .cal-day-num {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.8);
    }

    .calendar-day.today .cal-day-num {
      color: #3b82f6;
    }

    .cal-events-container {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .cal-event {
      font-size: 9px;
      background: rgba(59, 130, 246, 0.15);
      color: #93c5fd;
      padding: 3px 5px;
      border-radius: 4px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    /* ── Range Slider ── */
    .range-slider {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      outline: none;
    }

    .range-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #14b8a6;
      cursor: pointer;
      box-shadow: 0 0 6px rgba(20, 184, 166, 0.4);
      transition: transform 0.1s;
    }

    .range-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    /* ── Kompakt inline form ── */
    .inline-compact-input {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 1px solid rgba(168, 85, 247, 0.2);
      outline: none;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.85);
      font-family: inherit;
      padding: 3px 0;
      min-width: 60px;
    }

    .inline-compact-input::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    .inline-compact-input:focus {
      border-bottom-color: rgba(168, 85, 247, 0.5);
    }

    .inline-new-card.yellow .inline-compact-input {
      border-bottom-color: rgba(234, 179, 8, 0.2);
    }

    .inline-new-card.yellow .inline-compact-input:focus {

<body>
  <div class="app">
    <canvas id="shader-canvas"></canvas>

    <!-- Global Titlebar -->
    <div class="global-titlebar">
      <div style="display:flex; align-items:center; gap:10px;">

        </div>

      </div>
      <div style="display:flex; align-items:center; gap:10px; -webkit-app-region: no-drag;">
        <span class="shortcut-pill">⌨ Alt+Shift+1 → Panel</span>
        <button class="btn-ghost" id="btn-automath" title="Otomatik matematik hesaplama">MATH</button>
        <div class="window-controls"
          style="display: flex; gap: 4px; margin-left: 8px; border-left: 1px solid rgba(255,255,255,0.1); padding-left: 8px;">
          <button class="win-btn" id="btn-min">—</button>

        <button class="btn-accent" id="modal-save">Kaydet</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const canvas = document.getElementById('shader-canvas');
      const gl = canvas.getContext('webgl');
      if (!gl) return;

      const vertSrc = `
        attribute vec3 position;
        void main() { gl_Position = vec4(position, 1.0); }
      `;
      const fragSrc = `
        precision highp float;
        uniform vec2 resolution;
        uniform float time;
        uniform float xScale;
        uniform float yScale;
        uniform float distortion;
        void main() {
          vec2 p = (gl_FragCoord.xy * 2.0 - resolution) / min(resolution.x, resolution.y);
          float d = length(p) * distortion;
          float rx = p.x * (1.0 + d);
          float gx = p.x;
          float bx = p.x * (1.0 - d);
          float r = 0.12 / abs(p.y + sin((rx + time) * xScale) * yScale);
          float g = 0.12 / abs(p.y + sin((gx + time) * xScale) * yScale);
          float b = 0.12 / abs(p.y + sin((bx + time) * xScale) * yScale);

          // Dithering + noise — color banding'i giderir
          float noise = fract(sin(dot(gl_FragCoord.xy + time * 0.1, vec2(127.1, 311.7))) * 43758.5453);
          float dither = (fract(sin(dot(gl_FragCoord.xy, vec2(12.9898, 78.233))) * 43758.5453) - 0.5) / 255.0;
          float grain = (noise - 0.5) * 0.012;

          vec3 col = vec3(r, g, b) + grain + dither;
          col = pow(clamp(col, 0.0, 1.0), vec3(2.2));
          gl_FragColor = vec4(col, 1.0);
        }
      `;

      function compile(type, src) {
        const s = gl.createShader(type);
        gl.shaderSource(s, src);
        gl.compileShader(s);
        return s;
      }

      const prog = gl.createProgram();
      gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
      gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
      gl.linkProgram(prog);
      gl.useProgram(prog);

      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
        -1, -1, 0, 1, -1, 0, -1, 1, 0,
        1, -1, 0, -1, 1, 0, 1, 1, 0,
      ]), gl.STATIC_DRAW);

      const pos = gl.getAttribLocation(prog, 'position');
      gl.enableVertexAttribArray(pos);
      gl.vertexAttribPointer(pos, 3, gl.FLOAT, false, 0, 0);

      const uRes = gl.getUniformLocation(prog, 'resolution');
      const uTime = gl.getUniformLocation(prog, 'time');
      gl.uniform1f(gl.getUniformLocation(prog, 'xScale'), 1.0);
      gl.uniform1f(gl.getUniformLocation(prog, 'yScale'), 0.5);
      gl.uniform1f(gl.getUniformLocation(prog, 'distortion'), 0.28);

      function resize() {
        const w = canvas.clientWidth * devicePixelRatio | 0;
        const h = canvas.clientHeight * devicePixelRatio | 0;
        canvas.width = w; canvas.height = h;
        gl.viewport(0, 0, w, h);
        gl.uniform2f(uRes, w, h);
      }
      resize();
      window.addEventListener('resize', resize);

      let t = 0;
      (function loop() {
        t += 0.01;
        gl.uniform1f(uTime, t);
        gl.drawArrays(gl.TRIANGLES, 0, 6);
        requestAnimationFrame(loop);
      })();
    })();
  </script>
  <script src="main-app.js"></script>
