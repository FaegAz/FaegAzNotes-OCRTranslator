<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=272">
  <title>FaegAz Notes — Floating Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    input,
    textarea,
    button,
    select {
      -webkit-app-region: no-drag;
    }

    input,
    textarea {
      user-select: text;
      -webkit-user-select: text;
    }

    html,
    body {
      overflow: hidden;
      background: transparent;
    }

    .window {
      width: 100%;
      height: 100vh;
      border-radius: 16px;
      border: 1px solid rgba(168, 85, 247, 0.18);
      background: rgba(12, 10, 20, 0.96);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      font-family: 'Inter', system-ui, sans-serif;
      box-shadow: 0 0 0 1px rgba(168, 85, 247, 0.08) inset;
    }

    /* ── Başlık Çubuğu ── */
    .titlebar {
      padding: 11px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      background: rgba(255, 255, 255, 0.015);
      -webkit-app-region: drag;
    }

    .title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12.5px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .dot-grad {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a855f7, #eab308);
      box-shadow: 0 0 8px rgba(168, 85, 247, 0.7);
      flex-shrink: 0;
    }

    .grad-text {
      background: linear-gradient(90deg, #c084fc, #a855f7, #eab308);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 7px;
      -webkit-app-region: no-drag;
    }

    .badge {
      font-size: 9px;
      color: rgba(168, 85, 247, 0.6);
      background: rgba(168, 85, 247, 0.08);
      border: 1px solid rgba(168, 85, 247, 0.15);
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: 0.03em;
      font-weight: 500;
    }

    .close {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }

    .close:hover {
      background: rgba(255, 80, 80, 0.25);
      color: rgba(255, 255, 255, 0.6);
    }

    /* ── Tab Bar ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      padding: 6px 8px;
      gap: 4px;
    }

    .tab {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5px 4px;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      border-radius: 8px;
      transition: background 0.15s;
      position: relative;
    }

    .tab:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    .tab-icon {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      transition: background 0.15s;
    }

    .tab-icon.purple {
      background: rgba(168, 85, 247, 0.1);
      color: rgba(168, 85, 247, 0.5);
    }

    .tab-icon.pink {
      background: rgba(236, 72, 153, 0.1);
      color: rgba(236, 72, 153, 0.5);
    }

    .tab-icon.yellow {
      background: rgba(234, 179, 8, 0.08);
      color: rgba(234, 179, 8, 0.45);
    }

    .tab-icon.teal {
      background: rgba(20, 184, 166, 0.08);
      color: rgba(20, 184, 166, 0.45);
    }

    .tab-icon.blue {
      background: rgba(59, 130, 246, 0.08);
      color: rgba(59, 130, 246, 0.45);
    }

    .tab.active .tab-icon.purple {
      background: rgba(168, 85, 247, 0.22);
      color: #c084fc;
    }

    .tab.active .tab-icon.pink {
      background: rgba(236, 72, 153, 0.22);
      color: #ec4899;
    }

    .tab.active .tab-icon.yellow {
      background: rgba(234, 179, 8, 0.18);
      color: #eab308;
    }

    .tab.active .tab-icon.teal {
      background: rgba(20, 184, 166, 0.18);
      color: #14b8a6;
    }

    .tab.active .tab-icon.blue {
      background: rgba(59, 130, 246, 0.18);
      color: #3b82f6;
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 25%;
      right: 25%;
      height: 1.5px;
      background: linear-gradient(90deg, #a855f7, #eab308);
      border-radius: 2px 2px 0 0;
    }

    /* ── İçerik Alanı ── */
    .body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* Not kartları */
    .note {
      background: rgba(168, 85, 247, 0.06);
      border-radius: 9px;
      padding: 9px 11px;
      border-left: 1.5px solid rgba(168, 85, 247, 0.5);
      cursor: default;
      transition: background 0.15s;
      position: relative;
    }

    .note:hover {
      background: rgba(168, 85, 247, 0.1);
    }

    .note .todo-delete {
      position: absolute;
      top: 7px;
      right: 8px;
    }

    .note-title {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 3px;
    }

    .note-text {
      font-size: 11.5px;
      color: rgba(255, 255, 255, 0.62);
      line-height: 1.55;
    }

    .note-meta {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.16);
      margin-top: 4px;
    }

    /* Kelime kartları */
    .note-word {
      background: rgba(234, 179, 8, 0.07);
      border-radius: 9px;
      padding: 9px 11px;
      border-left: 1.5px solid rgba(234, 179, 8, 0.4);
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: background 0.15s;
    }

    .note-word:hover {
      background: rgba(234, 179, 8, 0.12);
    }

    .word-inline {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.8);
    }

    .word-arrow {
      color: rgba(234, 179, 8, 0.6);
      margin: 0 3px;
    }

    /* Gradyan ayırıcı */
    .grad-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(168, 85, 247, 0.3), rgba(234, 179, 8, 0.3), transparent);
      margin: 4px 10px 0;
    }

    /* ── Input Alanı ── */
    .input-area {
      padding: 6px 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-row {
      display: flex;
      gap: 6px;
    }

    .note-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.8);
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
    }

    .note-input::placeholder {
      color: rgba(255, 255, 255, 0.18);
    }

    .note-input:focus {
      border-color: rgba(168, 85, 247, 0.35);
    }

    .add-btn {
      background: rgba(168, 85, 247, 0.15);
      border: 1px solid rgba(168, 85, 247, 0.25);
      border-radius: 8px;
      padding: 8px 13px;
      color: #a855f7;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      transition: background 0.15s;
    }

    .add-btn:hover {
      background: rgba(168, 85, 247, 0.25);
    }

    .scan-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(168, 85, 247, 0.2);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.35);
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }

    .scan-btn:hover {
      background: rgba(168, 85, 247, 0.08);
    }

    .scan-icon {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 1.5px solid rgba(168, 85, 247, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      color: rgba(168, 85, 247, 0.7);
      flex-shrink: 0;
    }

    .scan-label {
      font-size: 10.5px;
    }

    .scan-hint {
      font-size: 9.5px;
      color: rgba(255, 255, 255, 0.18);
      margin-left: auto;
    }

    /* ── Görevler (Todo) ── */
    .todo-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      cursor: pointer;
      transition: background 0.15s;
    }

    .todo-item:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .todo-item:last-child {
      border-bottom: none;
    }

    .check {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.14);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .check.done {
      background: rgba(168, 85, 247, 0.2);
      border: none;
      color: #a855f7;
      font-size: 9px;
    }

    .todo-text {
      font-size: 11.5px;
      color: rgba(255, 255, 255, 0.7);
      font-weight: 500;
      flex: 1;
    }

    .todo-text.done {
      text-decoration: line-through;
      color: rgba(255, 255, 255, 0.18);
    }

    .todo-delete {
      opacity: 0.15;
      font-size: 10px;
      color: rgba(255, 80, 80, 0.6);
      cursor: pointer;
      background: none;
      border: none;
      transition: all 0.15s;
    }

    .todo-item:hover .todo-delete,
    .note-word:hover .todo-delete,
    .note:hover .todo-delete {
      opacity: 0.6;
    }

    .todo-delete:hover {
      opacity: 1 !important;
      color: #ff5050;
      transform: scale(1.1);
    }

    /* Alışkanlıklar (Habits) */
    .habit-card {
      background: rgba(20, 184, 166, 0.05);
      border: 1px solid rgba(20, 184, 166, 0.1);
      border-radius: 9px;
      padding: 9px 11px;
      border-left: 1.5px solid rgba(20, 184, 166, 0.4);
      display: flex;
      flex-direction: column;
    }

    .habit-day-mini {
      width: 17px;
      height: 17px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      color: rgba(255, 255, 255, 0.3);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }

    .habit-day-mini.checked {
      background: rgba(20, 184, 166, 0.2);
      border-color: rgba(20, 184, 166, 0.5);
      color: #14b8a6;
      font-weight: 600;
    }

    .panel-habits .note-input:focus {
      border-color: rgba(20, 184, 166, 0.35);
    }

    /* Boş durum */
    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: rgba(255, 255, 255, 0.15);
      font-size: 11px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 2px;
    }

    /* ── OCR Seçim Overlay ── */
    .ocr-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
      cursor: crosshair;
    }

    .ocr-overlay.active {
      display: block;
    }

    .selection-rect {
      position: absolute;
      border: 2px solid #a855f7;
      background: rgba(168, 85, 247, 0.1);
      pointer-events: none;
    }

    /* ── Lav Lambası ── */
    .lava-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .lava-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.1;
      animation: lavaFloat linear infinite;
    }

    .lava-blob:nth-child(1) {
      width: 100px;
      height: 100px;
      background: #a855f7;
      left: 10%;
      top: 15%;
      animation-duration: 16s;
    }

    .lava-blob:nth-child(2) {
      width: 80px;
      height: 80px;
      background: #eab308;
      right: 10%;
      bottom: 20%;
      animation-duration: 20s;
      animation-delay: -4s;
    }

    .lava-blob:nth-child(3) {
      width: 60px;
      height: 60px;
      background: #c084fc;
      left: 40%;
      top: 55%;
      animation-duration: 14s;
      animation-delay: -7s;
    }

    @keyframes lavaFloat {
      0% {
        transform: translate(0, 0) scale(1);
      }

      25% {
        transform: translate(30px, -50px) scale(1.3);
      }

      50% {
        transform: translate(-20px, -80px) scale(0.7);
      }

      75% {
        transform: translate(40px, -20px) scale(1.15);
      }

      100% {
        transform: translate(0, 0) scale(1);
      }
    }

    /* Panel gizle/göster */
    .panel-notes,
    .panel-todos,
    .panel-words,
    .panel-habits,
    .panel-calendar {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .panel-notes.active,
    .panel-todos.active,
    .panel-words.active,
    .panel-habits.active,
    .panel-calendar.active {
      display: flex;
    }

    /* Mini Takvim Seçicileri */
    .cal-grid-mini {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      margin-bottom: 10px;
    }

    .cal-day-mini {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      cursor: pointer;
      position: relative;
      transition: 0.15s;
    }

    .cal-day-mini:hover {
      background: rgba(59, 130, 246, 0.1);
      border-color: rgba(59, 130, 246, 0.3);
    }

    .cal-day-mini.today {
      border-color: #3b82f6;
      color: #3b82f6;
      font-weight: 600;
      background: rgba(59, 130, 246, 0.05);
    }

    .cal-day-mini.selected {
      background: rgba(59, 130, 246, 0.25);
      border-color: #3b82f6;
      color: white;
    }

    .cal-dot {
      position: absolute;
      bottom: 2px;
      width: 4px;
      height: 4px;
      background: #93c5fd;
      border-radius: 50%;
    }

    .panel-calendar .note-input:focus {
      border-color: rgba(59, 130, 246, 0.4);
    }
  </style>
</head>

<body>
  <div class="window">
    <div class="lava-container">
      <div class="lava-blob"></div>
      <div class="lava-blob"></div>
      <div class="lava-blob"></div>
    </div>
    <!-- Başlık -->
    <div class="titlebar">
      <div class="title">
        <div class="dot-grad"></div>
        <span class="grad-text">FaegAz Notes</span>
      </div>
      <div class="controls">
        <button class="close" id="btn-close">✕</button>
      </div>
    </div>

    <!-- Tab Bar -->
    <div class="tabs">
      <button class="tab active" data-tab="notes" title="Notlar">
        <div class="tab-icon purple">✎</div>
      </button>
      <button class="tab" data-tab="todos" title="Görevler">
        <div class="tab-icon pink">✓</div>
      </button>
      <button class="tab" data-tab="words" title="Kelimeler">
        <div class="tab-icon yellow">A</div>
      </button>
      <button class="tab" data-tab="habits" title="Alışkanlıklar">
        <div class="tab-icon teal">☑</div>
      </button>
      <button class="tab" data-tab="calendar" title="Takvim">
        <div class="tab-icon blue">&#x25A6;</div>
      </button>
    </div>

    <!-- Notlar Paneli -->
    <div class="panel-notes active" id="panel-notes">
      <div class="body" id="notes-list"></div>
      <div class="grad-line"></div>
      <div class="input-area">
        <div class="input-row">
          <textarea class="note-input" id="note-input" rows="1" placeholder="Not ekle..."></textarea>
        </div>
        <button class="scan-btn" id="btn-scan">
          <div class="scan-icon">⬚</div>
          <span class="scan-label">Ekrandan kelime seç</span>
          <span class="scan-hint">tıkla</span>
        </button>
      </div>
    </div>

    <!-- Görevler Paneli -->
    <div class="panel-todos" id="panel-todos">
      <div class="body" id="todos-list"></div>
      <div class="grad-line"></div>
      <div class="input-area">
        <div class="input-row">
          <textarea class="note-input" id="todo-input" rows="1" placeholder="Görev ekle..."></textarea>
        </div>
      </div>
    </div>

    <!-- Kelimeler Paneli -->
    <div class="panel-words" id="panel-words">
      <div class="body" id="words-list"></div>
      <div class="grad-line"></div>
      <div class="input-area">
        <div class="input-row" style="flex-direction:column;gap:5px;">
          <input type="text" class="note-input" id="word-orig-input" placeholder="Kelime..."
            style="height:32px;padding:6px 10px;" />
          <div style="display:flex;gap:5px;align-items:center;">
            <input type="text" class="note-input" id="word-tr-input" placeholder="Çeviri..."
              style="flex:1;min-width:0;height:32px;padding:6px 10px;" />
            <button class="add-btn" id="btn-add-word" style="height:32px;width:32px;padding:0;flex-shrink:0;">+</button>
          </div>
        </div>
        <button class="scan-btn" id="btn-scan-words">
          <div class="scan-icon">⬚</div>
          <span class="scan-label">Çeviri yapmak istediğin kelimeyi seç</span>
        </button>
      </div>
    </div>

    <!-- Alışkanlıklar Paneli -->
    <div class="panel-habits" id="panel-habits">
      <div class="body" id="habits-list"></div>
      <div class="grad-line"></div>
      <div class="input-area">
        <div class="input-row">
          <textarea class="note-input" id="habit-input" rows="1" placeholder="Alışkanlık ekle..."></textarea>
        </div>
      </div>
    </div>

    <!-- Takvim Paneli -->
    <div class="panel-calendar" id="panel-calendar">
      <div class="body" style="padding-bottom: 0;">
        <div id="cal-mini-header"
          style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:11px; font-weight:600; color:#3b82f6;">
        </div>
        <div id="cal-mini-grid" class="cal-grid-mini"></div>
        <div class="grad-line" style="margin: 0 0 8px 0;"></div>
        <div id="cal-mini-events" style="flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:4px;"></div>
      </div>
      <div class="input-area" style="padding-top: 5px;">
        <div class="input-row">
          <textarea class="note-input" id="cal-input" rows="1" placeholder="Seçili güne ekle..."></textarea>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
