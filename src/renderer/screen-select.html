<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ekran Seçimi</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100vw; height: 100vh; overflow: hidden; cursor: crosshair; background: transparent; }

    .screen-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.3);
    }

    .selection {
      position: fixed;
      border: 2px solid #a855f7;
      background: rgba(168, 85, 247, 0.15);
      box-shadow: 0 0 12px rgba(168, 85, 247, 0.4);
      pointer-events: none;
      display: none;
    }

    .hint {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(12, 10, 20, 0.85);
      border: 1px solid rgba(168, 85, 247, 0.3);
      border-radius: 8px;
      padding: 10px 20px;
      color: rgba(255, 255, 255, 0.7);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      backdrop-filter: blur(12px);
      z-index: 10;
    }

    .hint kbd {
      background: rgba(168, 85, 247, 0.15);
      border: 1px solid rgba(168, 85, 247, 0.3);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
      color: #c084fc;
    }
  </style>
</head>
<body>
  <img class="screen-bg" id="screen-bg">
  <div class="overlay" id="overlay"></div>
  <div class="selection" id="selection"></div>
  <div class="hint">Kelime seçmek için sürükle &nbsp;|&nbsp; <kbd>ESC</kbd> iptal</div>

  <script>
    const bg = document.getElementById('screen-bg');
    const overlay = document.getElementById('overlay');
    const selection = document.getElementById('selection');

    // Ana süreçten ekran görüntüsünü al
    window.api.onScreenImage((base64) => {
      bg.src = `data:image/png;base64,${base64}`;
    });

    let startX = 0, startY = 0, selecting = false;

    overlay.addEventListener('mousedown', (e) => {
      startX = e.clientX;
      startY = e.clientY;
      selecting = true;
      selection.style.display = 'block';
    });

    document.addEventListener('mousemove', (e) => {
      if (!selecting) return;
      const x = Math.min(startX, e.clientX);
      const y = Math.min(startY, e.clientY);
      const w = Math.abs(e.clientX - startX);
      const h = Math.abs(e.clientY - startY);
      selection.style.left = x + 'px';
      selection.style.top = y + 'px';
      selection.style.width = w + 'px';
      selection.style.height = h + 'px';
    });

    document.addEventListener('mouseup', (e) => {
      if (!selecting) return;
      selecting = false;

      const x = Math.min(startX, e.clientX);
      const y = Math.min(startY, e.clientY);
      const w = Math.abs(e.clientX - startX);
      const h = Math.abs(e.clientY - startY);

      if (w < 10 || h < 10) {
        selection.style.display = 'none';
        return;
      }

      // DPI ölçeklendirme: Windows %125/%150 kullanıyorsa
      // ekran koordinatları ile screenshot pikselleri farklıdır.
      // devicePixelRatio ile çarparak gerçek piksele çeviriyoruz.
      const dpr = window.devicePixelRatio || 1;
      window.api.sendRegionSelected({
        x: Math.round(x * dpr),
        y: Math.round(y * dpr),
        w: Math.round(w * dpr),
        h: Math.round(h * dpr),
      });
    });

    // ESC → iptal
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        window.api.sendRegionSelected(null);
      }
    });
  </script>
</body>
</html>
